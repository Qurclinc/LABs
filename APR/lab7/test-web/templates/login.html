{% extends "base.html" %}

{% block content %}

<div class="hero small">
    <h1>Auth Gateway</h1>
    <p class="subtitle">enter credentials</p>
</div>

<div class="panel">
    <h2>Login</h2>

    <form method="POST">
        <input type="text" name="login" placeholder="login" required>
        <input type="password" name="password" placeholder="password" required>

        <button class="btn" type="submit">enter</button>
    </form>

    <p class="hint">
        no account? <a href="{{ url_for('index.register') }}">register</a>
    </p>
</div>

{% endblock %}
